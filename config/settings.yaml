app:
  name: "MiraDocs"
  data_dir: "data"
  db_path: "data/registry.db"

parsing:
  primary_parser: "docling"
  fallback_parser: "pymupdf"
  page_image_dpi: 150
  ocr_enabled: true
  # Hardware acceleration for Docling.
  #   auto : detect best available (CUDA → MPS → CPU)
  #   cpu  : force CPU (most compatible across all OS/architectures)
  #   cuda : NVIDIA GPU (Linux/Windows)
  #   mps  : Apple Silicon GPU (macOS arm64)
  accelerator_device: "auto"
  # Intra-op threads for Docling (0 = library default).
  accelerator_num_threads: 0
  # Workers for parallel PDF page rendering (0 = auto = min(cpu_cores // 2, 4)).
  page_image_workers: 0
  # Workers for parallel figure cropping (0 = auto = min(cpu_cores // 2, 4)).
  figure_workers: 0

embedding:
  provider: "ollama"
  model: "bge-m3"
  dimensions: 1024
  ollama_url: "http://localhost:11434"

indexing:
  default_store: "qdrant"
  qdrant_path: "data/indexes/qdrant"
  collection_name: "architecture_docs"
  # qdrant_url: "http://localhost:6333"   # Uncomment to use Qdrant server instead of
                                          # local file mode. Required when the API server
                                          # and MCP server run as separate processes.

chunking:
  max_chunk_tokens: 512
  overlap_tokens: 50

quality:
  low_text_threshold: 50
  min_pages_for_ready: 1

entity_extraction:
  use_llm: true
  ollama_model: "qwen3.5:4b"

search:
  dense_weight: 0.7
  sparse_weight: 0.3
  rerank_enabled: true
  rerank_model: "qwen3.5:4b"
  default_top_k: 10
  rerank_top_k: 5

mcp:
  server_name: "miradocs"
  transport: "stdio"
  max_top_k: 20

retrieval:
  default_search_mode: "auto"
  default_top_k: 8
  fallback_to_keyword: true
  max_result_text_chars: 1800

graph:
  use_llm_relations: true         # true = LLM-extracted predicates; false = co-occurrence only
  co_occurrence_window_pages: 1    # pages within which two entities are considered co-occurring
  max_expansion_hops: 1            # depth for graph_local search expansion
  max_expanded_chunks: 5           # max extra chunks injected per query via graph walk
  ollama_model: "qwen3.5:4b"         # used only when use_llm_relations: true
  min_edge_weight: 1               # prune edges below this weight
